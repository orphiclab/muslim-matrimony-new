name: CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/muslim-nikah-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/muslim-nikah-frontend

jobs:
  ci:
    name: Build Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
        run: npm run build

  docker:
    name: Build And Push Images
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: /root/muslim-nikah
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: APP_DIR,DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,BACKEND_IMAGE,FRONTEND_IMAGE,IMAGE_TAG,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,JWT_SECRET,JWT_EXPIRES_IN,FRONTEND_URL
          script: |
            set -e
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > .env <<EOF
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=$POSTGRES_DB
            JWT_SECRET=$JWT_SECRET
            JWT_EXPIRES_IN=$JWT_EXPIRES_IN
            FRONTEND_URL=$FRONTEND_URL
            EOF

            cat > docker-compose.prod.yml <<EOF
            services:
              db:
                image: postgres:16-alpine
                restart: unless-stopped
                environment:
                  POSTGRES_USER: \${POSTGRES_USER}
                  POSTGRES_PASSWORD: \${POSTGRES_PASSWORD}
                  POSTGRES_DB: \${POSTGRES_DB}
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD-SHELL", "pg_isready -U \${POSTGRES_USER} -d \${POSTGRES_DB}"]
                  interval: 5s
                  timeout: 5s
                  retries: 10

              backend:
                container_name: muslim-nikah-backend
                image: $BACKEND_IMAGE:$IMAGE_TAG
                restart: unless-stopped
                ports:
                  - "4000:4000"
                environment:
                  DATABASE_URL: postgresql://\${POSTGRES_USER}:\${POSTGRES_PASSWORD}@db:5432/\${POSTGRES_DB}
                  PORT: "4000"
                  NODE_ENV: production
                  JWT_SECRET: \${JWT_SECRET}
                  JWT_EXPIRES_IN: \${JWT_EXPIRES_IN}
                  FRONTEND_URL: \${FRONTEND_URL}
                depends_on:
                  db:
                    condition: service_healthy
                networks:
                  - default
                  - npm-network

              frontend:
                container_name: muslim-nikah-frontend
                image: $FRONTEND_IMAGE:$IMAGE_TAG
                restart: unless-stopped
                ports:
                  - "3002:3000"
                depends_on:
                  - backend
                networks:
                  - default
                  - npm-network

            volumes:
              postgres_data:

            networks:
              npm-network:
                external: true
                name: nginx-proxy-manager_npm-network
            EOF

            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

            # Compose v1 (docker-compose 1.29) crashes with KeyError: ContainerConfig on modern images.
            # Only Docker Compose v2 (docker compose) is supported here.
            if ! docker compose version >/dev/null 2>&1; then
              echo "Installing Docker Compose v2 plugin (docker-compose-plugin)..."
              if command -v apt-get >/dev/null 2>&1; then
                apt-get update -qq
                DEBIAN_FRONTEND=noninteractive apt-get install -y docker-compose-plugin || true
              elif command -v dnf >/dev/null 2>&1; then
                dnf install -y docker-compose-plugin || true
              elif command -v yum >/dev/null 2>&1; then
                yum install -y docker-compose-plugin || true
              fi
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "APT package missing or failed; installing Compose v2 CLI binary (GitHub)..."
              ARCH=$(uname -m)
              case "$ARCH" in
                x86_64) SUFFIX="x86_64" ;;
                aarch64|arm64) SUFFIX="aarch64" ;;
                *)
                  echo "ERROR: unsupported CPU arch for Compose binary: $ARCH" >&2
                  exit 1
                  ;;
              esac
              COMPOSE_VERSION="v2.33.1"
              mkdir -p /usr/local/lib/docker/cli-plugins
              curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-${SUFFIX}" -o /usr/local/lib/docker/cli-plugins/docker-compose
              chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
            fi
            if ! docker compose version >/dev/null 2>&1; then
              echo "ERROR: docker compose (v2) still not available after install." >&2
              exit 1
            fi

            # Avoid name conflicts when project prefix or container_name changed between deploys
            docker compose --env-file .env -f docker-compose.prod.yml down --remove-orphans 2>/dev/null || true
            docker ps -aq --filter name=muslim-nikah-backend | xargs -r docker rm -f
            docker ps -aq --filter name=muslim-nikah-frontend | xargs -r docker rm -f

            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
